include classpath("standalone.conf")

whisk {
  runtimes {
    # Local SeBS benchmark images are built into the host Docker daemon and are
    # not published under this tag. OpenWhisk parses
    # `spcleth/serverless-benchmarks:tag` as prefix `spcleth`, name
    # `serverless-benchmarks`, so the prefix match must use only `spcleth`.
    bypass-pull-for-local-images = true
    local-image-prefix = "spcleth"
  }

  container-factory {
    container-args {
      network = "host"
    }
  }
}
